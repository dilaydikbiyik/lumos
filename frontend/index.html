<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Home-screen icon: the brand firefly on a night square (180x180 PNG for
         iOS; the SVG covers browsers that prefer it). Was a page screenshot. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Mobile-first viewport — prevents zoom on input focus iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA / Mobile appearance -->
    <meta name="theme-color" content="#0C0D14" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lumos" />

    <!-- SEO -->
    <title>Lumos — Smart Investment Assistant</title>
    <meta name="description" content="AI-powered investment risk profiling and portfolio allocation — built for educational purposes." />

    <!-- Safe area insets for notched phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
