<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Amber-orange gradient for the body -->
    <linearGradient id="bodyGrad" x1="60" y1="28" x2="60" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="45%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E64A00"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft wing glow -->
    <filter id="wingGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left wing — golden arc -->
  <path
    d="M60 52 C50 38, 24 32, 26 52 C27 62, 42 70, 56 66"
    stroke="#C8A84B"
    stroke-width="1.8"
    stroke-linecap="round"
    fill="none"
    filter="url(#wingGlow)"
    opacity="0.85"
  />
  <!-- Left wing inner -->
  <path
    d="M60 58 C54 46, 34 40, 34 56 C34 64, 44 69, 56 67"
    stroke="#C8A84B"
    stroke-width="1.2"
    stroke-linecap="round"
    fill="none"
    opacity="0.55"
  />

  <!-- Right wing — golden arc -->
  <path
    d="M60 52 C70 38, 96 32, 94 52 C93 62, 78 70, 64 66"
    stroke="#C8A84B"
    stroke-width="1.8"
    stroke-linecap="round"
    fill="none"
    filter="url(#wingGlow)"
    opacity="0.85"
  />
  <!-- Right wing inner -->
  <path
    d="M60 58 C66 46, 86 40, 86 56 C86 64, 76 69, 64 67"
    stroke="#C8A84B"
    stroke-width="1.2"
    stroke-linecap="round"
    fill="none"
    opacity="0.55"
  />

  <!-- Body — teardrop/firefly shape -->
  <path
    d="M60 28 C60 28, 64 38, 64 54 C64 68, 62 80, 60 88 C58 80, 56 68, 56 54 C56 38, 60 28, 60 28 Z"
    fill="url(#bodyGrad)"
    filter="url(#glow)"
  />

  <!-- Head dot -->
  <circle cx="60" cy="27" r="5" fill="#FFD740" filter="url(#glow)"/>

  <!-- Bioluminescent belly dot (white) -->
  <circle cx="60" cy="60" r="3.2" fill="white" opacity="0.92" filter="url(#glow)"/>

  <!-- Subtle ambient glow behind body -->
  <ellipse cx="60" cy="60" rx="10" ry="28" fill="#FF8C00" opacity="0.07"/>
</svg>
