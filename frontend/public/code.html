<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#EA580C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2410C;stop-opacity:1" />
    </linearGradient>
    <filter id="strong-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="wing-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#020617" rx="40" />
  
  <!-- Double-Lined Wing Arcs (Left) -->
  <g opacity="0.6" filter="url(#wing-glow)">
    <path d="M180 140 C120 120, 100 200, 180 240" fill="none" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round" />
    <path d="M170 160 C130 150, 120 200, 170 220" fill="none" stroke="#FDE68A" stroke-width="1.2" stroke-linecap="round" opacity="0.7" />
  </g>
  
  <!-- Double-Lined Wing Arcs (Right) -->
  <g opacity="0.6" filter="url(#wing-glow)">
    <path d="M220 140 C280 120, 300 200, 220 240" fill="none" stroke="#FDE68A" stroke-width="2.5" stroke-linecap="round" />
    <path d="M230 160 C270 150, 280 200, 230 220" fill="none" stroke="#FDE68A" stroke-width="1.2" stroke-linecap="round" opacity="0.7" />
  </g>
  
  <!-- Firefly Body with Stronger Glow -->
  <g filter="url(#strong-glow)">
    <!-- Head -->
    <circle cx="200" cy="135" r="8" fill="#F59E0B" />
    <!-- Thorax -->
    <path d="M190 148 Q200 145 210 148 L208 175 Q200 180 192 175 Z" fill="#F59E0B" />
    <!-- Abdomen (Glowing Tail - Intense Orange) -->
    <path d="M190 185 Q200 180 210 185 L205 245 Q200 265 195 245 Z" fill="url(#body-grad)" />
  </g>
  
  <!-- Intense Inner Spark -->
  <circle cx="200" cy="215" r="4" fill="#FFFFFF" opacity="1" />

  <!-- Typography -->
  <text x="200" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="200" font-size="32" fill="#F8FAFC" letter-spacing="12">LUMOS</text>
</svg>
