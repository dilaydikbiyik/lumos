databases: []

services:
  - type: web
    name: lumos-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: AI_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Optional extra quota pools — without these the 16-pool key matrix
      # collapses to 4 pools in production
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: TCMB_EVDS_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      # ⚠️ Render free-plan disks are EPHEMERAL: a SQLite file is wiped on every
      # deploy/restart — user profiles and holdings would vanish. Before real
      # users arrive, point this at a managed Postgres
      # (postgresql+asyncpg://...) and add asyncpg to requirements.txt.
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./lumos.db
