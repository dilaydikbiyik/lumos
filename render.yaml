databases: []  # DB lives on Neon (see DATABASE_URL)

services:
  - type: web
    name: lumos-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: AI_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Optional extra quota pools — without these the 16-pool key matrix
      # collapses to 4 pools in production
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: TCMB_EVDS_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Free-tier cross-provider fallback keys (gemini -> groq -> openrouter);
      # optional — the chain skips providers whose key is missing
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # sync:false — the real value is the Neon Postgres URL set in the
      # dashboard. A hardcoded value here would OVERWRITE it on every
      # blueprint sync (silently flipping prod back to ephemeral SQLite).
      - key: DATABASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
