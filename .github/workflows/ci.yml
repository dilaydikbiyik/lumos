name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — ruff + pytest + alembic
    runs-on: ubuntu-latest

    env:
      # All env vars needed by tests — no real keys required
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:///./ci_scratch.db
      GEMINI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      GROQ_API_KEY: ""
      OPENROUTER_API_KEY: ""
      CLERK_JWT_ISSUER: "https://example.clerk.accounts.dev/.well-known/jwks.json"
      CLERK_SECRET_KEY: ""
      CLERK_PUBLISHABLE_KEY: ""
      ADMIN_CLERK_IDS: ""
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Tests (pytest + coverage ≥50%)
        run: |
          python -m pytest backend/tests/ \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -q

      - name: Migrations apply to fresh database
        run: alembic upgrade head

  docker:
    name: Docker — image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t lumos-backend .

  frontend:
    name: Frontend — eslint + vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Tests (vitest)
        run: npm test

      - name: Build (vite)
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_API_BASE_URL: https://example.onrender.com
