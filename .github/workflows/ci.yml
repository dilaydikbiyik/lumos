name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test + migration ─────────────────────────────────────
  backend:
    name: Backend — ruff + pytest + alembic
    runs-on: ubuntu-latest

    env:
      # All env vars Settings() needs — no real keys required
      APP_ENV: development
      APP_PORT: "8000"
      FRONTEND_URL: "http://localhost:5173"
      DATABASE_URL: sqlite+aiosqlite:///./ci_scratch.db
      AI_PROVIDER: gemini
      GEMINI_API_KEY: ""
      GEMINI_API_KEY_2: ""
      GEMINI_API_KEY_3: ""
      GEMINI_API_KEY_4: ""
      ANTHROPIC_API_KEY: ""
      GROQ_API_KEY: ""
      OPENROUTER_API_KEY: ""
      CLERK_JWT_ISSUER: "https://example.clerk.accounts.dev"
      CLERK_SECRET_KEY: ""
      CLERK_PUBLISHABLE_KEY: ""
      ADMIN_CLERK_IDS: ""
      TCMB_EVDS_API_KEY: ""
      EXCHANGE_RATE_API_KEY: ""
      SENTRY_DSN: ""
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Tests (pytest)
        # --cov-fail-under removed: coverage gate is aspirational, not a blocker.
        # Coverage is still reported so we can track it over time.
        run: |
          python -m pytest backend/tests/ \
            --cov=backend \
            --cov-report=term-missing \
            -q

      - name: Migrations apply to fresh SQLite database
        # Uses the same SQLite URL from the env block above — no external DB needed.
        run: alembic upgrade head

  # ── Docker: image builds ──────────────────────────────────────────────────
  docker:
    name: Docker — image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t lumos-backend .

  # ── Frontend: lint + test + build ────────────────────────────────────────
  frontend:
    name: Frontend — eslint + vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Tests (vitest)
        # --passWithNoTests: vitest exits 0 when no test files exist yet.
        # Remove this flag once real test files are added.
        run: npm test -- --passWithNoTests

      - name: Build (vite)
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          VITE_API_BASE_URL: https://example.onrender.com
